<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hoteles Mixteca | Guía Profesional</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="hero-section">
    <div class="hero-content">
      <h1>HOTELES MIXTECA</h1>
      <p>Guía premium de hospedaje en la región mixteca oaxaqueña</p>
    </div>
  </header>

  <main class="container">
    <section>
        <div class="category-header"><h2>HUAJUAPAN DE LEÓN</h2><div class="line-decorator"></div></div>
        <div class="grid" id="grid-huajuapan"></div>
    </section>
    <section style="margin-top: 50px;">
        <div class="category-header"><h2>TLAXIACO</h2><div class="line-decorator"></div></div>
        <div class="grid" id="grid-tlaxiaco"></div>
    </section>
    <section style="margin-top: 50px;">
        <div class="category-header"><h2>NOCHIXTLÁN</h2><div class="line-decorator"></div></div>
        <div class="grid" id="grid-nochixtlan"></div>
    </section>
  </main>

  <div class="modal" id="hotelModal" onclick="closeModal(event)">
    <div class="modal-content">
      <div id="mainImg"></div>
      <div class="content">
        <div id="modalStars"></div>
        <h1 id="modalTitle"></h1>
        <p id="modalType" class="hotel-type"></p>
        <div id="modalDetails" style="margin: 20px 0;"></div>
        <h4>Servicios incluidos</h4>
        <div class="chips" id="modalChips"></div>
        <div id="modalInfo"></div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
